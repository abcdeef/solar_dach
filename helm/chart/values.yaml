# Grafana Official Helm Chart Values
# Compatible with grafana/grafana chart

## Image configuration
image:
  repository: 192.168.1.135:8880/meins/solar-dach
  tag: "0.1.0"
  pullPolicy: Always

## Replica configuration
# Achtung: Bei aktivierter Persistence mit RWO (ReadWriteOnce) kann nur 1 Replika laufen.
# Erhöhe nur, wenn deine StorageClass RWX (ReadWriteMany) unterstützt.
replicas: 1

## Deployment Strategy
# Recreate verhindert Multi-Attach Errors bei RWO Volumes
deploymentStrategy:
  type: Recreate

## Service configuration
service:
  type: ClusterIP
  port: 3021
  targetPort: 3000
  annotations: {}

## Ingress configuration
ingress:
  enabled: true
  ingressClassName: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "default-strip-solar-dach@kubernetescrd"
  hosts: []
  path: /solar_dach
  pathType: Prefix
  tls: []

## Security Context
podSecurityContext: {}
  # runAsNonRoot: true
  # runAsUser: 1000
  # runAsGroup: 1000

securityContext: {}
  # allowPrivilegeEscalation: false
  # capabilities:
  #   drop:
  #     - ALL
  # readOnlyRootFilesystem: true

## Resources
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

## Node selector, tolerations, affinity
nodeSelector: {}
tolerations: []
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/os
              operator: In
              values:
                - linux
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: kubernetes.io/hostname
              operator: NotIn
              values:
                - raspi5

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: solar-dach
        app.kubernetes.io/instance: solar-dach

## Persistence
persistence:
  enabled: false
  type: pvc
  retain: true
  storageClassName: "longhorn"
  accessModes:
    - ReadWriteOnce
  size: 5Gi

adminUser: ""
adminPassword: ""
admin: {}

## Environment variables
env:
  BASE_PATH: /solar_dach
envFrom: []

## Pod Disruption Budget
podDisruptionBudget:
  enabled: false

## Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

## Extra volumes and mounts
extraVolumes: []
extraVolumeMounts: []

## Init and extra containers
initContainers: []
extraContainers: []

## Pod annotations and labels
podAnnotations: {}
podLabels: {}

## Force redeploy on upgrade (set via --set-string restartAt=...)
restartAt: ""

## Service monitor for Prometheus
serviceMonitor:
  enabled: false
  labels: {}
  interval: 30s
  path: /metrics
